name: Auto Merge PR

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to auto-merge.
        required: true
      head_sha:
        description: Exact PR head SHA to auto-merge.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable merge after required checks
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          current_head="$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)"
          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER head moved from $HEAD_SHA to $current_head; skipping stale auto-merge request."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --auto --merge --delete-branch --match-head-commit "$HEAD_SHA"
