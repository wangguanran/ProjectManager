name: Auto Merge PR

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to auto-merge.
        required: true
      head_sha:
        description: Exact PR head SHA to auto-merge.
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  enable-auto-merge:
    name: enable-auto-merge
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable merge after required checks
        id: enable
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          current_head="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER head moved from $HEAD_SHA to $current_head; skipping stale auto-merge request."
            exit 0
          fi
          is_draft="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json isDraft --jq .isDraft)"
          if [ "$is_draft" = "true" ]; then
            echo "skipped_draft=true" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUMBER is draft/WIP; waiting for gh pr ready before enabling auto-merge."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash --delete-branch --match-head-commit "$HEAD_SHA"

      - name: Dispatch release watcher for GitHub-token auto-merge
        if: steps.enable.outputs.skipped_draft != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.inputs.head_sha || github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          base_branch="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json baseRefName --jq .baseRefName)"
          if [ "$base_branch" != "main" ]; then
            echo "PR #$PR_NUMBER targets $base_branch, not main; no stable release watcher needed."
            exit 0
          fi
          current_head="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid)"
          if [ "$current_head" != "$HEAD_SHA" ]; then
            echo "PR #$PR_NUMBER head moved from $HEAD_SHA to $current_head; skipping stale release watcher dispatch."
            exit 0
          fi

          # GITHUB_TOKEN-created auto-merge pushes do not trigger push workflows.
          # workflow_dispatch is exempt, so this watcher waits for the merge SHA.
          gh workflow run release-after-main-merge.yml \
            --repo "$REPO" \
            --ref "$base_branch" \
            -f "target_ref=$base_branch" \
            -f "pr_number=$PR_NUMBER" \
            -f "pr_head_sha=$HEAD_SHA"
