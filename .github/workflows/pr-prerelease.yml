name: PR Prerelease

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          startsWith(github.head_ref, 'feature/') ||
          startsWith(github.head_ref, 'bug/')
        )
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf binutils git python3-venv

      - name: Build project (beta channel)
        shell: bash
        env:
          PROJMAN_RELEASE_CHANNEL: beta
        run: |
          export PATH="/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
          python3 --version
          bash build.sh

      - name: Verify release binary
        run: python scripts/check_linux_standalone_binary.py out/binary/projman

      - name: Run tests
        shell: bash
        run: bash -lc "source venv/bin/activate && pytest"

      - name: Run lint
        shell: bash
        run: bash -lc "source venv/bin/activate && make lint"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: projman-pr-${{ github.event.pull_request.number || github.run_id }}-python-package
          if-no-files-found: error
          path: |
            out/package/*.whl
            out/package/*.tar.gz

  build-binaries:
    name: build-binaries (prerelease) (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf binutils python3-venv

      - name: Build project (beta channel)
        shell: bash
        env:
          PROJMAN_RELEASE_CHANNEL: beta
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            export PATH="/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            python3 --version
          fi
          bash build.sh

      - name: Verify release binary
        shell: bash
        run: |
          binary_path="$(cat out/projman_binary_path.txt)"
          validator_python="venv/bin/python"
          if [ -x "venv/Scripts/python.exe" ]; then
            validator_python="venv/Scripts/python.exe"
          fi
          "$validator_python" scripts/check_linux_standalone_binary.py "$binary_path"

      - name: Compute artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          uname_s="$(uname -s 2>/dev/null || echo unknown)"
          case "$uname_s" in
            Linux) platform="linux" ;;
            Darwin) platform="macos" ;;
            MINGW*|MSYS*|CYGWIN*|Windows_NT) platform="windows" ;;
            *) platform="unknown" ;;
          esac
          arch="$(uname -m 2>/dev/null || echo unknown)"
          case "$arch" in
            x86_64|amd64) arch="x86_64" ;;
            aarch64|arm64) arch="arm64" ;;
          esac
          echo "platform=$platform" >> "$GITHUB_OUTPUT"
          echo "arch=$arch" >> "$GITHUB_OUTPUT"

      - name: Prepare prerelease binary
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [ -f out/projman_binary_path.txt ]; then
            binary_path="$(cat out/projman_binary_path.txt)"
          else
            binary_path=""
          fi

          if [ -n "$binary_path" ] && [ -e "$binary_path" ]; then
            ext=""
            case "$binary_path" in
              *.exe) ext=".exe" ;;
              *.pkg) ext=".pkg" ;;
            esac
            out_file="out/prerelease_upload/projman-${{ steps.meta.outputs.platform }}-${{ steps.meta.outputs.arch }}${ext}"
            mkdir -p out/prerelease_upload
            cp -L "$binary_path" "$out_file"
            echo "upload_path=$out_file" >> "$GITHUB_OUTPUT"
          else
            echo "Warning: prerelease binary path unavailable, falling back to upload full out/ directory."
            find out -maxdepth 5 \( -type f -o -type l \) | sed 's#^#  - #' || true
            echo "upload_path=out" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: projman-pr-${{ github.event.pull_request.number || github.run_id }}-${{ steps.meta.outputs.platform }}-${{ steps.meta.outputs.arch }}
          if-no-files-found: error
          path: ${{ steps.package.outputs.upload_path }}
