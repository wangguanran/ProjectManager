# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build project
      run: bash build.sh

    - name: Test system-wide pip install
      run: |
        python3 -m venv venv_sys
        source venv_sys/bin/activate
        echo 1 | bash install.sh
        pm --version
        deactivate
        rm -rf venv_sys

    - name: Test standalone binary install
      run: |
        echo 2 | bash install.sh
        export PATH="$HOME/.local/bin:$PATH"
        pm --version
        rm "$HOME/.local/bin/pm"

    - name: Test venv isolated install
      run: |
        echo 3 | bash install.sh
        ./run_pm.sh --version
        rm -rf venv run_pm.sh

    - name: Test with pytest
      run: pytest
