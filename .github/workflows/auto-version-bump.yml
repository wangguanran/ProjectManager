name: Auto Version Bump

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number for the final auto-version-bump check.
        required: true
      head_branch:
        description: PR source branch name.
        required: true
      base_branch:
        description: PR target branch name.
        required: true
        default: main
      head_sha:
        description: Exact PR head SHA to validate without re-bumping.
        required: true

permissions:
  actions: write
  contents: write
  pull-requests: read

concurrency:
  group: auto-version-bump-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  auto-version-bump:
    name: auto-version-bump
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ github.event.inputs.head_sha }}
          fetch-depth: 1

      - name: Validate dispatched final auto-version context
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.inputs.head_sha }}
        run: |
          set -euo pipefail
          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$HEAD_SHA" ]; then
            echo "::error::Checked out $actual_head, expected final PR head $HEAD_SHA."
            exit 1
          fi
          echo "Auto-version-bump final context validated for $HEAD_SHA."

      - name: Resolve bump part from PR branch
        if: github.event_name == 'pull_request'
        id: bump
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          case "$HEAD_BRANCH" in
            bug/*)
              echo "part=patch" >> "$GITHUB_OUTPUT"
              ;;
            feature/*)
              echo "part=minor" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No automatic version bump for branch: $HEAD_BRANCH"
              ;;
          esac

      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request' && steps.bump.outputs.skip != 'true'
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Detect release code changes
        if: github.event_name == 'pull_request' && steps.bump.outputs.skip != 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "+refs/heads/main:refs/remotes/origin/main"
          python3 .github/scripts/bump_version.py --base-ref origin/main --head-ref HEAD --check-release-code-changes

      - name: Sync version from latest main
        if: github.event_name == 'pull_request' && steps.bump.outputs.skip != 'true'
        id: version
        shell: bash
        env:
          BUMP_PART: ${{ steps.bump.outputs.part }}
          HAS_RELEASE_CODE_CHANGES: ${{ steps.changes.outputs.has_release_code_changes }}
        run: |
          set -euo pipefail
          if [ "$HAS_RELEASE_CODE_CHANGES" = "true" ]; then
            version_part="$BUMP_PART"
          else
            version_part="none"
            echo "No release code changes detected; keeping pyproject.toml version aligned with main."
          fi
          python3 .github/scripts/bump_version.py --base-ref origin/main --part "$version_part" --write

      - name: Commit version sync
        id: commit
        if: github.event_name == 'pull_request' && steps.bump.outputs.skip != 'true'
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- pyproject.toml; then
            echo "pyproject.toml already uses version $VERSION"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: sync version to $VERSION"
          git push origin "HEAD:$HEAD_BRANCH"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Dispatch PR checks for bumped commit
        if: github.event_name == 'pull_request' && steps.commit.outputs.pushed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_SHA: ${{ steps.commit.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_BRANCH: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          # Commits pushed with GITHUB_TOKEN do not trigger pull_request/synchronize
          # workflows. Trigger the required checks explicitly on the bumped head.
          for workflow in python-app.yml pylint.yml mypy.yml; do
            gh workflow run "$workflow" --ref "$HEAD_BRANCH"
          done

          gh workflow run validate-main-pr-source.yml \
            --ref "$HEAD_BRANCH" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_branch=$HEAD_BRANCH" \
            -f "base_branch=$BASE_BRANCH" \
            -f "head_sha=$HEAD_SHA"

          gh workflow run auto-version-bump.yml \
            --ref "$HEAD_BRANCH" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_branch=$HEAD_BRANCH" \
            -f "base_branch=$BASE_BRANCH" \
            -f "head_sha=$HEAD_SHA"

          gh workflow run auto-merge-pr.yml \
            --ref "$BASE_BRANCH" \
            -f "pr_number=$PR_NUMBER" \
            -f "head_sha=$HEAD_SHA"
