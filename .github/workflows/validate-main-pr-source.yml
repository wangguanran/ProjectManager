name: Validate Main PR Source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to validate.
        required: true
      head_branch:
        description: PR source branch name.
        required: true
      base_branch:
        description: PR target branch name.
        required: true
        default: main
      head_sha:
        description: Exact PR head SHA to validate.
        required: true

permissions:
  contents: read

jobs:
  validate-main-source-branch:
    name: validate-main-source-branch
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    steps:
      - name: Require same-repo feature, bug, or ci source branch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.event.inputs.head_branch || github.ref_name }}
          HEAD_REPO: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::PRs targeting main must come from branches in $BASE_REPO, got $HEAD_REPO."
            exit 1
          fi

          case "$HEAD_BRANCH" in
            feature/*|bug/*|ci/*)
              echo "Allowed source branch: $HEAD_BRANCH"
              ;;
            *)
              echo "::error::PRs targeting main must come from feature/*, bug/*, or ci/* branches."
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.head_sha || github.sha }}
          fetch-depth: 0

      - name: Require rebased PR branch
        shell: bash
        env:
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.inputs.base_branch || 'main' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.head_sha || github.sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          base_ref="refs/remotes/origin/${BASE_BRANCH}"

          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$HEAD_SHA" ]; then
            echo "::error::Checked out $actual_head, expected PR head $HEAD_SHA."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$base_ref" HEAD; then
            echo "::error::PR branch must be rebased on latest ${BASE_BRANCH}."
            echo "::error::Run: git fetch origin && git rebase origin/${BASE_BRANCH}"
            exit 1
          fi

          merge_count="$(git rev-list --merges --count "${base_ref}..HEAD")"
          if [ "$merge_count" != "0" ]; then
            echo "::error::PR branch contains merge commits after ${BASE_BRANCH}; rebase instead of merging ${BASE_BRANCH} into the branch."
            git log --oneline --merges "${base_ref}..HEAD"
            exit 1
          fi

      - name: Require expected release version bump
        shell: bash
        env:
          BASE_BRANCH: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.inputs.base_branch || 'main' }}
          HEAD_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || github.event.inputs.head_branch || github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          base_ref="refs/remotes/origin/${BASE_BRANCH}"
          python3 .github/scripts/validate_release_version.py \
            --base-ref "$base_ref" \
            --head-ref HEAD \
            --head-branch "$HEAD_BRANCH" \
            --event-name "$EVENT_NAME"
