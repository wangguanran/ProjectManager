name: Validate Main PR Source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  validate-main-source-branch:
    name: validate-main-source-branch
    runs-on: ubuntu-latest
    steps:
      - name: Require feature or bug source branch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::PRs targeting main must come from branches in $BASE_REPO, got $HEAD_REPO."
            exit 1
          fi

          case "$HEAD_BRANCH" in
            feature/*|bug/*)
              echo "Allowed source branch: $HEAD_BRANCH"
              ;;
            *)
              echo "::error::PRs targeting main must come from feature/* or bug/* branches."
              exit 1
              ;;
          esac
