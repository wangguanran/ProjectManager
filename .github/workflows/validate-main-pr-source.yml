name: Validate Main PR Source

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  validate-main-source-branch:
    name: validate-main-source-branch
    runs-on: ubuntu-latest
    steps:
      - name: Require same-repo feature, bug, or ci source branch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::PRs targeting main must come from branches in $BASE_REPO, got $HEAD_REPO."
            exit 1
          fi

          case "$HEAD_BRANCH" in
            feature/*|bug/*|ci/*)
              echo "Allowed source branch: $HEAD_BRANCH"
              ;;
            *)
              echo "::error::PRs targeting main must come from feature/*, bug/*, or ci/* branches."
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Require rebased PR branch
        shell: bash
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin "+refs/heads/${BASE_BRANCH}:refs/remotes/origin/${BASE_BRANCH}"
          base_ref="refs/remotes/origin/${BASE_BRANCH}"

          actual_head="$(git rev-parse HEAD)"
          if [ "$actual_head" != "$HEAD_SHA" ]; then
            echo "::error::Checked out $actual_head, expected PR head $HEAD_SHA."
            exit 1
          fi

          if ! git merge-base --is-ancestor "$base_ref" HEAD; then
            echo "::error::PR branch must be rebased on latest ${BASE_BRANCH}."
            echo "::error::Run: git fetch origin && git rebase origin/${BASE_BRANCH}"
            exit 1
          fi

          merge_count="$(git rev-list --merges --count "${base_ref}..HEAD")"
          if [ "$merge_count" != "0" ]; then
            echo "::error::PR branch contains merge commits after ${BASE_BRANCH}; rebase instead of merging ${BASE_BRANCH} into the branch."
            git log --oneline --merges "${base_ref}..HEAD"
            exit 1
          fi

      - name: Require expected release version bump
        shell: bash
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          case "$HEAD_BRANCH" in
            bug/*)
              bump_part="patch"
              ;;
            feature/*)
              bump_part="minor"
              ;;
            *)
              echo "No release version bump required for branch: $HEAD_BRANCH"
              exit 0
              ;;
          esac

          base_ref="refs/remotes/origin/${BASE_BRANCH}"
          has_release_code_changes="$(
            python3 .github/scripts/bump_version.py --base-ref "$base_ref" --head-ref HEAD --check-release-code-changes
          )"
          base_version="$(
            git show "${base_ref}:pyproject.toml" | python3 -c 'import re,sys; m=re.search(r"(?m)^version\s*=\s*\"(\d+)\.(\d+)\.(\d+)\"", sys.stdin.read()); print(".".join(m.groups()) if m else "");'
          )"
          head_version="$(
            python3 -c 'import re,pathlib; m=re.search(r"(?m)^version\s*=\s*\"(\d+)\.(\d+)\.(\d+)\"", pathlib.Path("pyproject.toml").read_text(encoding="utf-8")); print(".".join(m.groups()) if m else "");'
          )"

          if [ -z "$base_version" ] || [ -z "$head_version" ]; then
            echo "::error::Unable to parse pyproject.toml version."
            exit 1
          fi

          if [ "$has_release_code_changes" != "true" ]; then
            if [ "$head_version" != "$base_version" ]; then
              echo "::error::No release code changes detected for $HEAD_BRANCH, so pyproject.toml must stay at $base_version; got $head_version."
              exit 1
            fi
            echo "No release code changes detected; version remains $head_version."
            exit 0
          fi

          expected_version="$(
            BASE_VERSION="$base_version" BUMP_PART="$bump_part" python3 - <<'PY'
          import os

          major, minor, patch = (int(part) for part in os.environ["BASE_VERSION"].split("."))
          part = os.environ["BUMP_PART"]
          if part == "minor":
              minor += 1
              patch = 0
          elif part == "patch":
              patch += 1
          else:
              raise SystemExit(f"unsupported bump part: {part}")
          print(f"{major}.{minor}.{patch}")
          PY
          )"

          if [ "$head_version" != "$expected_version" ]; then
            echo "::error::Expected pyproject.toml version $expected_version for $HEAD_BRANCH, got $head_version."
            echo "::error::Wait for auto-version-bump.yml or re-run it after rebasing on ${BASE_BRANCH}."
            exit 1
          fi

          echo "Version bump is valid: $base_version -> $head_version ($bump_part)"
